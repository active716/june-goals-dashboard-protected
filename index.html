<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>6 月目標看板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3ee;
      --text: #24201a;
      --muted: #746c61;
      --line: #d9d2c7;
      --blue: #2764a5;
      --surface: #fffefa;
      --error: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top left, #e9f1f5, transparent 32%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    main {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 16px 40px rgba(30, 35, 40, 0.12);
      padding: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.25;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 11px;
      font-size: 17px;
      color: var(--text);
      background: white;
    }

    button {
      width: 100%;
      min-height: 44px;
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      background: var(--blue);
      color: white;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }

    .message {
      min-height: 20px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .message.error { color: var(--error); }
  </style>
</head>
<body>
  <main>
    <h1>6 月目標看板</h1>
    <p>輸入密碼後才會在這台裝置解開內容。公開網站上只保存加密資料。</p>
    <form id="unlock-form">
      <label>
        密碼
        <input id="password" type="password" autocomplete="current-password" autofocus>
      </label>
      <button type="submit">開啟看板</button>
      <div class="message" id="message">手機和電腦都可以使用同一個網址。</div>
    </form>
  </main>

    function base64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return bytes;
    }

    async function deriveKey(password) {
      const passwordBytes = new TextEncoder().encode(password);
      const keyMaterial = await crypto.subtle.importKey("raw", passwordBytes, "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: base64ToBytes(payload.salt),
          iterations: payload.iterations,
          hash: "SHA-256"
        },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password) {
      const key = await deriveKey(password);
      const encrypted = base64ToBytes(payload.data);
      const tag = base64ToBytes(payload.tag);
      const combined = new Uint8Array(encrypted.length + tag.length);
      combined.set(encrypted);
      combined.set(tag, encrypted.length);
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: base64ToBytes(payload.iv), tagLength: 128 },
        key,
        combined
      );
      return new TextDecoder().decode(decrypted);
    }

    document.getElementById("unlock-form").addEventListener("submit", async event => {
      event.preventDefault();
      const message = document.getElementById("message");
      const password = document.getElementById("password").value;
      message.className = "message";
      message.textContent = "正在開啟...";

      try {
        const html = await unlock(password);
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        message.className = "message error";
        message.textContent = "密碼不正確，或瀏覽器不支援加密解鎖。";
      }
    });
